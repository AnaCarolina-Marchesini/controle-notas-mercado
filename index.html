<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Mercado</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- favico -->
    <link rel="shortcut icon" href="imgs/favicon.ico" type="image/x-icon">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main id="app-container">
        <h1>Controle de Mercado</h1>

        <section id="input-area">
            <div>
                <label for="data">Dia da compra:</label>
                <input type="date" id="data">
            </div>

            <div>
                <label for="valor">Valor da compra: </label>
                <input type="number" id="valor" step="0.01" placeholder="R$ 0,00">
                <button id="btn-adicionar">+</button>
            </div>
        </section>

        <section id="display-area">
            <ul id="lista-notas">

            </ul>
        </section>

        <footer>
            <div id="total-container">
                <p>Total: R$ <span id="valor-total">0.00</span></p>
                <button id="btn-download" title="Baixar resumo">📥 Baixar Resumo</button>
            </div>
        </footer>
    </main>

    <footer id="autor-footer">
        <p>Desenvolvido por <strong>Ana Marchesini</strong></p>
        <div class="social-links">
            <a href="https://github.com/AnaCarolina-Marchesini" target="_blank">GitHub</a>
        </div>
        <p class="copyright">&copy; 2026 - Controle de Mercado</p>
    </footer>

    <script src="script.js"></script>
</body>

<script src="script.js"></script>
</body>

</html>
